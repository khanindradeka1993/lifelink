<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeLink</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>

<body>

  <div class="container">

    <h1>❤️ LifeLink</h1>
    <p class="subtitle">
      Decentralized Healthcare on Arc
    </p>

    <button id="connectBtn">
      Connect Wallet
    </button>

    <p id="walletAddress">
      Wallet not connected
    </p>
<div id="dashboard" style="
display:flex;
gap:10px;
margin:20px 0;
">

<div style="
flex:1;
background:#2563eb;
color:white;
padding:15px;
border-radius:10px;
text-align:center;
">
<div>Total Donors</div>
<h2 id="totalDonors">0</h2>
</div>

<div style="
flex:1;
background:#dc3545;
color:white;
padding:15px;
border-radius:10px;
text-align:center;
">
<div>Active SOS</div>
<h2 id="totalRequests">0</h2>
</div>

</div>
    
    <div class="card">

      <h2>Blood Donor Registration</h2>

      <input
        type="text"
        id="name"
        placeholder="Your Name"
      >

      <select id="bloodGroup">
  <option value="">Select Blood Group</option>
  <option value="A+">A+</option>
  <option value="A-">A-</option>
  <option value="B+">B+</option>
  <option value="B-">B-</option>
  <option value="AB+">AB+</option>
  <option value="AB-">AB-</option>
  <option value="O+">O+</option>
  <option value="O-">O-</option>
</select>

      <input
        type="text"
        id="city"
        placeholder="City"
      >

      <input
id="phone"
type="tel"
placeholder="Phone Number"
/>
      <button id="registerBtn">
        Register Donor
      </button>
<h3 style="margin-top:20px;">Registered Donors</h3>
<div id="donorList"></div>

<hr style="margin:20px 0;">

<h2>🔍 Search Donors</h2>
<select id="searchBloodGroup">
  <option value="">Select Blood Group</option>
  <option value="A+">A+</option>
  <option value="A-">A-</option>
  <option value="B+">B+</option>
  <option value="B-">B-</option>
  <option value="AB+">AB+</option>
  <option value="AB-">AB-</option>
  <option value="O+">O+</option>
  <option value="O-">O-</option>
</select>
<input
  type="text"
  id="searchCity"
  placeholder="Enter City"
/>
<button id="searchBtn">
  📍 Nearby Donors
</button>
<div id="searchResults"></div>
</div>
 <hr>

<h2>🚨 SOS Emergency Blood Request</h2>

<input
id="patientName"
type="text"
placeholder="Patient Name">

<select id="requestBloodGroup">
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<input
id="hospital"
type="text"
placeholder="Hospital">

<input
id="requestCity"
type="text"
placeholder="City">

<input
id="contact"
type="text"
placeholder="Contact Number">

<button id="requestBtn" style="
width:100%;
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
">
🚨 Send SOS Request
</button>
<div id="requestList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="app.js"></script>

</body>
</html>
